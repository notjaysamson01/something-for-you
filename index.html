        </div>

    <div class="center-wrapper">
    <p class="message" id="secret-paragraph" data-text="Hey Jha, tutal napag-usapan na rin naman natin yung feelings natin, hindi ko na masyadong papahabain pa. I know na hindi ka sure sa nararamdaman mo kung gusto mo pa rin ba ako talaga, 
    kasi nga sabi mo, Grade 4 pa lang yung feelings natin na yun. Pero Jha, what if we try lang naman, diba?

I don’t want us to end without even trying to have a beginning. I don’t want us to regret not trying, kasi nga diba may sinasabi sila na, “If it works, edi masaya. If it doesn’t, at least we tried.”

What if tayo pala talaga, tapos hindi natin na-try, tapos pagsisisihan lang natin na hindi natin binigyan ng chance ang isa’t isa? I really, really want to try. Sabi na rin naman nila, Tita, na okay daw sa kanila na ligawan kita, diba? Wala naman pumipigil sa atin na subukan.

Hindi kita pinipilit. Ayaw ko lang na hindi natin i-take yung chance na meron tayo. I’m not asking to be your suitor again, kasi sabi mo nga, let’s get to know each other muna. Gusto sana kitang ayain mag-hang out kasama yung friends mo if you want.

and yes, inaral ko gumawa ng website para lang sa'yo, I had fun learning and making this, and I hope you like the song i chose for you, and lastly, Jha I like you since the first moment I met you and everyday we talk, I find myself liking you more and more.
That’s all. ❤️">
